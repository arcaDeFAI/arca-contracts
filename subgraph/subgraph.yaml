    name: ShadowStrategyUSSDUSDC
    network: sonic
    source:
      address: "0x4ddB609F6D03dC29172c51C6D7f3a2B66e997c18"
      abi: ShadowStrategy
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Vault
        - RewardEvent
      abis:
        - name: ShadowStrategy
          file: ./abis/ShadowStrategy.json
      eventHandlers:
        - event: RewardForwarded(indexed address,indexed address,uint256)
